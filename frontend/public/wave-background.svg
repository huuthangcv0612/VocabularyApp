<svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .wave-light { fill: #87CEEB; }
      .wave-dark { fill: #ffffff; }
    </style>
  </defs>
  
  <!-- Radial wave pattern -->
  <g id="waves">
    <!-- Wave 1 -->
    <path class="wave-dark" d="M 500,50 Q 350,150 250,250 Q 200,300 150,350 Q 100,400 50,500" fill="none" stroke="white" stroke-width="80"/>
    
    <!-- Wave 2 -->
    <path class="wave-dark" d="M 500,50 Q 650,150 750,250 Q 800,300 850,350 Q 900,400 950,500" fill="none" stroke="white" stroke-width="80"/>
    
    <!-- Wave 3 -->
    <path class="wave-dark" d="M 950,500 Q 850,650 750,750 Q 800,800 850,850 Q 900,900 950,950" fill="none" stroke="white" stroke-width="80"/>
    
    <!-- Wave 4 -->
    <path class="wave-dark" d="M 50,500 Q 150,650 250,750 Q 200,800 150,850 Q 100,900 50,950" fill="none" stroke="white" stroke-width="80"/>
    
    <!-- Wave 5 -->
    <path class="wave-dark" d="M 500,950 Q 350,850 250,750 Q 200,700 150,650 Q 100,600 50,500" fill="none" stroke="white" stroke-width="80"/>
    
    <!-- Wave 6 -->
    <path class="wave-dark" d="M 500,950 Q 650,850 750,750 Q 800,700 850,650 Q 900,600 950,500" fill="none" stroke="white" stroke-width="80"/>
    
    <!-- Additional diagonal waves -->
    <path class="wave-dark" d="M 350,150 Q 280,250 250,350 Q 220,400 200,450" fill="none" stroke="white" stroke-width="70"/>
    
    <path class="wave-dark" d="M 650,150 Q 720,250 750,350 Q 780,400 800,450" fill="none" stroke="white" stroke-width="70"/>
    
    <path class="wave-dark" d="M 350,850 Q 280,750 250,650 Q 220,600 200,550" fill="none" stroke="white" stroke-width="70"/>
    
    <path class="wave-dark" d="M 650,850 Q 720,750 750,650 Q 780,600 800,550" fill="none" stroke="white" stroke-width="70"/>
  </g>
  
  <!-- Background -->
  <rect width="1000" height="1000" fill="#A8D8F0"/>
</svg>